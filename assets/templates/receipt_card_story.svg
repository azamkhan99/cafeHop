<!-- templates/receipt_card_story_1080x1920.svg -->
<svg width="1080" height="1920"
     viewBox="0 0 1080 1920"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <!-- Photo clip (portrait, slightly taller) -->
    <clipPath id="photoClip">
      <rect x="48" y="48" width="984" height="1040"/>
    </clipPath>

    <!-- Star symbol -->
    <symbol id="star" viewBox="0 0 24 24">
      <path d="M12 2.2l2.86 6.03 6.64.55-5.05 4.33 1.53 6.46L12 16.9 6.02 19.57l1.53-6.46L2.5 8.78l6.64-.55L12 2.2z"/>
    </symbol>

    {% include "subway_symbols.svg" %}

    <style>
      @font-face {
        font-family: "ReceiptTitle";
        src: url("{{ font_receipt_title }}") format("truetype");
        font-weight: bold;
        font-style: normal;
      }

      @font-face {
        font-family: "ReceiptMono";
        src: url("{{ font_receipt_mono }}") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      .title {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 88px;
        letter-spacing: 5px;
        fill: #161616;
      }

      .body {
        font-family: "Courier Prime", monospace;
        font-weight: 400;
        font-size: 42px;
        fill: #1f1f1f;
      }

      .footer {
        font-family: "Courier Prime", monospace;
        font-weight: 400;
        font-size: 22px; /* smaller footer */
        fill: #6b6b6b;
      }

      .muted { fill: #6b6b6b; }

      .dash {
        stroke: #1a1a1a;
        stroke-width: 1.8;
        stroke-dasharray: 10 11;
        opacity: 0.40;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1080" height="1920" fill="#FBFAF8"/>

  <!-- Cafe photo (portrait hero) -->
  <image
    xlink:href="{{ cafe_photo_href }}"
    x="48" y="48"
    width="984" height="1040"
    clip-path="url(#photoClip)"
    preserveAspectRatio="xMidYMid slice"/>

  <!-- Divider below image -->
  <line x1="48" y1="1140" x2="1032" y2="1140" class="dash"/>

  <!-- Title -->
  <text x="540" y="1260" text-anchor="middle" class="title">
    {{ name | upper }}
  </text>

  <!-- Divider under title -->
  <line x1="48" y1="1310" x2="1032" y2="1310" class="dash"/>

  <!-- Body -->
  <text x="48" y="1390" class="body">Location: {{ neighborhood }}</text>

  <!-- Rating -->
  <text x="48" y="1460" class="body">Rating:</text>
  <g transform="translate(240, 1430)">
    {% for i in range(5) %}
      <use xlink:href="#star"
           x="{{ i * 52 }}" y="0"
           width="40" height="40"
           fill="{% if i < rating|int %}#161616{% else %}none{% endif %}"
           stroke="#161616"
           stroke-width="1.8"/>
    {% endfor %}
  </g>

   <!-- Subway icons -->
   <text x="48" y="1530" class="body">Subway:</text>
   <g transform="translate(240, 1500)">
     {% for line in subway_lines %}
       <use href="#line-{{ line }}"
            x="{{ loop.index0 * 44 }}"
            width="36" height="36"/>
     {% endfor %}
   </g>

  <text x="48" y="1600" class="body">Citibike: {{ citibike_station }}</text>
  <text x="48" y="1670" class="body muted">Date: {{ date }}</text>

  <!-- Footer divider (tight + light) -->
  <line x1="48" y1="1740" x2="1032" y2="1740" class="dash"/>

  <!-- Link (smaller, quieter) -->
  <text x="540" y="1800" text-anchor="middle" class="footer">
    {{ gmaps_link }}
  </text>

</svg>
